name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: lint · type · test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev extras)
        run: |
          python -m pip install --upgrade pip
          # Core deps come with the package; dev adds ruff/mypy/pytest. The
          # heavy domain extras (agent, longread, R, search) are intentionally
          # left out — the suite runs against injected fakes, no Docker daemon.
          pip install -e ".[dev]"

      - name: Ruff (lint + import order)
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy (strict)
        run: mypy src

      - name: Pytest (unit; Docker-backed integration excluded)
        run: pytest -m "not integration" -q
